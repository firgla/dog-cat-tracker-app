<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoraCare</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --pastel-purple: #C4C3E3;
            --dark-purple: #504E76;
            --light-beige: #FDF8E2;
            --calm-green: #A3B565;
            --light-orange: #FCDD9D;
            --hot-orange: #F1642E;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--dark-purple);
            background: var(--light-beige);
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
            color: var(--dark-purple);
        }

        .app {
            min-height: 100vh;
            max-width: 640px;
            margin: 0 auto;
            background: var(--light-beige);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 20px 26px 22px;
            background: var(--light-beige);
            border-bottom: 2px solid var(--pastel-purple);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            display: grid;
            place-items: center;
            width: 54px;
            height: 54px;
            border-radius: 18px;
            background: var(--light-orange);
            color: var(--hot-orange);
            font-size: 18px;
            font-weight: 900;
        }

        .brand h1 {
            margin: 0;
            font-size: 28px;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .brand p {
            margin: 6px 0 0;
            color: var(--calm-green);
            font-size: 14px;
            font-weight: 700;
        }

        .round-action {
            display: grid;
            place-items: center;
            width: 48px;
            min-width: 48px;
            height: 48px;
            padding: 0;
            border-radius: 18px;
            background: var(--pastel-purple);
            font-size: 22px;
            font-weight: 800;
        }

        .screen {
            display: none;
            padding: 22px 26px 26px;
        }

        .screen.active {
            display: block;
            animation: rise 0.22s ease;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pet-list {
            display: grid;
            gap: 18px;
        }

        .pet-card,
        .add-card,
        .form-card,
        .care-card {
            border-radius: 26px;
            background: var(--light-beige);
            border: 2px solid var(--pastel-purple);
        }

        .pet-card {
            display: grid;
            grid-template-columns: 150px 1fr 54px;
            gap: 22px;
            align-items: center;
            width: 100%;
            padding: 24px;
            text-align: left;
        }

        .pet-card:hover,
        .add-card:hover,
        .primary-btn:hover,
        .secondary-btn:hover,
        .tab-btn:hover {
            transform: translateY(-1px);
        }

        .pet-photo,
        .photo-preview {
            display: grid;
            place-items: center;
            overflow: hidden;
            background: var(--pastel-purple);
            color: var(--dark-purple);
            text-align: center;
            line-height: 1.08;
            padding: 10px;
            overflow-wrap: anywhere;
        }

        .pet-photo {
            width: 150px;
            height: 150px;
            border-radius: 24px;
            font-size: 22px;
            font-weight: 900;
        }

        .pet-photo img,
        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .pet-card h2 {
            margin: 0 0 8px;
            font-size: 30px;
            letter-spacing: -0.03em;
        }

        .pet-card p,
        .empty-note,
        .hint,
        .meta-text {
            margin: 0;
            color: var(--dark-purple);
            opacity: 0.82;
            line-height: 1.45;
        }

        .arrow {
            display: grid;
            place-items: center;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--pastel-purple);
            color: var(--hot-orange);
            font-size: 30px;
            font-weight: 800;
            line-height: 1;
            padding-bottom: 3px;
        }

        .add-card {
            width: 100%;
            padding: 36px 20px;
            border-style: dashed;
            background: var(--light-beige);
            color: var(--dark-purple);
        }

        .add-card strong {
            display: block;
            margin-top: 12px;
            font-size: 26px;
            font-weight: 500;
        }

        .add-icon {
            display: grid;
            place-items: center;
            width: 58px;
            height: 58px;
            margin: 0 auto;
            border-radius: 20px;
            background: var(--light-orange);
            color: var(--hot-orange);
            font-size: 36px;
            font-weight: 300;
        }

        .empty-state {
            display: grid;
            gap: 18px;
            min-height: 54vh;
            align-content: center;
        }

        .empty-note {
            padding: 18px 20px;
            border-radius: 22px;
            background: var(--pastel-purple);
            font-weight: 700;
        }

        .form-card,
        .care-card {
            padding: 22px;
        }

        .form-title,
        .detail-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 20px;
        }

        .form-title h2,
        .detail-title h2 {
            margin: 0;
            font-size: 30px;
            letter-spacing: -0.03em;
        }

        .back-btn {
            display: grid;
            place-items: center;
            width: 48px;
            height: 48px;
            border-radius: 17px;
            background: var(--pastel-purple);
            font-size: 28px;
        }

        label {
            display: block;
            margin: 18px 0 8px;
            font-size: 15px;
            font-weight: 700;
            color: var(--dark-purple);
        }

        input,
        select {
            width: 100%;
            height: 58px;
            border: 2px solid var(--pastel-purple);
            border-radius: 18px;
            padding: 15px 16px;
            color: var(--dark-purple);
            background: var(--light-beige);
            outline: none;
            text-align: left;
        }

        input[type="file"] {
            height: auto;
            min-height: 58px;
            padding: 12px;
        }

        input[type="file"]::file-selector-button {
            margin-right: 12px;
            border: 0;
            border-radius: 12px;
            padding: 10px 12px;
            background: var(--light-orange);
            color: var(--dark-purple);
            font-weight: 800;
        }

        input[type="file"]::-webkit-file-upload-button {
            margin-right: 12px;
            border: 0;
            border-radius: 12px;
            padding: 10px 12px;
            background: var(--light-orange);
            color: var(--dark-purple);
            font-weight: 800;
        }

        input:focus,
        select:focus {
            border-color: var(--hot-orange);
        }

        .field-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .photo-field {
            display: grid;
            justify-items: center;
            gap: 8px;
            margin-top: 18px;
        }

        .photo-preview {
            width: 132px;
            height: 132px;
            border-radius: 28px;
            font-size: 18px;
            font-weight: 900;
        }

        .photo-field label {
            width: 100%;
            margin: 0;
        }

        .hint {
            margin-top: 8px;
            font-size: 14px;
        }

        .primary-btn,
        .secondary-btn {
            width: 100%;
            min-height: 58px;
            border-radius: 20px;
            margin-top: 22px;
            font-size: 18px;
            font-weight: 900;
        }

        .primary-btn {
            background: var(--hot-orange);
            color: var(--light-beige);
        }

        .secondary-btn {
            background: var(--calm-green);
            color: var(--light-beige);
        }

        .profile-hero {
            display: grid;
            grid-template-columns: 118px 1fr;
            gap: 18px;
            align-items: center;
            margin-bottom: 18px;
            padding: 18px;
            border-radius: 26px;
            background: var(--pastel-purple);
        }

        .profile-hero .pet-photo {
            width: 118px;
            height: 118px;
        }

        .profile-hero h2 {
            margin: 0 0 8px;
            font-size: 30px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--light-orange);
            color: var(--dark-purple);
            font-size: 13px;
            font-weight: 800;
        }

        .chip.green {
            background: var(--calm-green);
            color: var(--light-beige);
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 18px 0;
        }

        .tab-btn {
            min-height: 58px;
            border-radius: 18px;
            padding: 9px;
            background: var(--light-orange);
            color: var(--dark-purple);
            font-size: 14px;
            font-weight: 900;
            line-height: 1.1;
        }

        .tab-btn.active {
            background: var(--dark-purple);
            color: var(--light-beige);
        }

        .care-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }

        .care-head h3 {
            margin: 0 0 8px;
            font-size: 24px;
            line-height: 1.05;
        }

        .next-date {
            min-width: 130px;
            padding: 11px 14px;
            border-radius: 18px;
            background: var(--calm-green);
            color: var(--light-beige);
            text-align: center;
            font-size: 15px;
            font-weight: 700;
        }

        .reminders-title {
            margin-bottom: 4px;
        }

        .reminders {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 4px;
        }

        .reminder-option {
            position: relative;
        }

        .reminder-option input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .reminder-option span {
            display: grid;
            place-items: center;
            min-height: 44px;
            border: 2px solid var(--pastel-purple);
            border-radius: 16px;
            color: var(--dark-purple);
            font-size: 13px;
            font-weight: 800;
        }

        .reminder-option input:checked + span {
            background: var(--hot-orange);
            border-color: var(--hot-orange);
            color: var(--light-beige);
        }

        .bottom-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 18px;
        }

        @media (max-width: 560px) {
            .header,
            .screen {
                padding-left: 18px;
                padding-right: 18px;
            }

            .header {
                padding-top: 16px;
                padding-bottom: 18px;
            }

            .pet-card {
                grid-template-columns: 116px 1fr 44px;
                gap: 14px;
                padding: 18px;
            }

            .pet-photo {
                width: 116px;
                height: 116px;
            }

            .pet-card h2,
            .brand h1,
            .form-title h2,
            .detail-title h2 {
                font-size: 25px;
            }

            .arrow {
                width: 44px;
                height: 44px;
            }

            .field-grid,
            .profile-hero,
            .bottom-actions {
                grid-template-columns: 1fr;
            }

            .field-grid {
                gap: 0;
            }

            .tabs {
                grid-template-columns: 1fr 1fr;
            }

            .care-head {
                display: grid;
            }

            .next-date {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="header">
            <div class="brand">
                <div class="logo">NC</div>
                <div>
                    <h1>NoraCare</h1>
                    <p>Трекер для питомцев</p>
                </div>
            </div>
        </header>

        <section id="home_screen" class="screen active">
            <div id="pets_list" class="pet-list"></div>
        </section>

        <section id="form_screen" class="screen">
            <div class="form-card">
                <div class="form-title">
                    <button class="back-btn" type="button" onclick="showHome()">‹</button>
                    <h2 id="form_title">Добавить питомца</h2>
                </div>

                <label for="pet_name">Имя</label>
                <input id="pet_name" type="text" placeholder="Например, Нора" oninput="refreshNamePreview()">

                <div class="field-grid">
                    <div>
                        <label for="pet_type">Тип животного</label>
                        <select id="pet_type" onchange="populateBreeds()">
                            <option value="dog">Собака</option>
                            <option value="cat">Кошка</option>
                        </select>
                    </div>
                    <div>
                        <label for="pet_breed">Порода</label>
                        <select id="pet_breed"></select>
                    </div>
                </div>

                <label for="pet_birth_date">Дата рождения</label>
                <input id="pet_birth_date" type="date">

                <div class="photo-field">
                    <label for="pet_photo_file">Фотография</label>
                    <div id="photo_preview" class="photo-preview"></div>
                    <input id="pet_photo_file" type="file" accept="image/*" onchange="handlePhotoUpload(event)">
                </div>
                <p class="hint">Если фото не выбрать, карточка останется с мягкой цветной заглушкой.</p>

                <button class="primary-btn" type="button" onclick="savePet()">Сохранить питомца</button>
            </div>
        </section>

        <section id="detail_screen" class="screen">
            <div id="pet_detail"></div>
        </section>
    </main>

                "Курильский бобтейл",
                "Лаперм",
                "Ликой",
                "Манчкин",
                "Мейн-кун",
                "Меконгский бобтейл",
                "Минскин",
                "Мэнкс",
                "Невская маскарадная",
                "Немецкий рекс",
                "Норвежская лесная",
                "Ориентальная",
                "Оцикет",
                "Персидская",
                "Петерболд",
                "Пиксибоб",
                "Рагамаффин",
                "Русская голубая",
                "Рэгдолл",
                "Саванна",
                "Селкирк-рекс",
                "Серенгети",
                "Сиамская",
                "Сибирская",
                "Сингапурская",
                "Скоттиш-страйт",
                "Сноу-шу",
                "Сококе",
                "Сомалийская",
                "Тайская",
                "Тойгер",
                "Тонкинская",
                "Турецкая ангора",
                "Турецкий ван",
                "Украинский левкой",
                "Уральский рекс",
                "Хайленд-страйт",
                "Хайленд-фолд",
                "Цейлонская",
                "Шантильи-тиффани",
                "Шартрез",
                "Шотландская вислоухая",
                "Экзотическая короткошерстная",
                "Яванская",
                "Японский бобтейл"
            ]
        };

        let appState = loadState();
        let currentScreen = "home";
        let selectedPetId = appState.pets[0]?.id || "";
        let editingPetId = "";
        let activeCareKey = CARE_TYPES[0].key;
        let uploadedPhotoData = "";

        function loadState() {
            const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
            if (!raw) {
                return { pets: [] };
            }

            try {
                const parsed = JSON.parse(raw);
                return {
                    pets: Array.isArray(parsed.pets) ? parsed.pets.map(normalizePet) : []
                };
            } catch (error) {
                return { pets: [] };
            }
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        }

        function createId() {
            return "pet-" + Date.now() + "-" + Math.random().toString(16).slice(2, 8);
        }

        function createPet(base) {
            const care = {};
            CARE_TYPES.forEach((item) => {
                care[item.key] = {
                    date: "",
                    medicine: "",
                    intervalDays: "",
                    reminders: [...DEFAULT_REMINDERS]
                };
            });

            return normalizePet({
                id: base.id || createId(),
                name: base.name || "",
                type: base.type || "dog",
                breed: base.breed || BREEDS.dog[0],
                birthDate: base.birthDate || "",
                photo: base.photo || "",
                care
            });
        }

        function normalizePet(pet) {
            const type = pet.type === "cat" ? "cat" : "dog";
            const normalized = {
                id: pet.id || createId(),
                name: pet.name || "",
                type,
                breed: pet.breed || BREEDS[type][0],
                birthDate: pet.birthDate || "",
                photo: pet.photo || "",
                care: {}
            };

            CARE_TYPES.forEach((item) => {
                const oldCare = pet.care?.[item.key] || {};
                normalized.care[item.key] = {
                    date: oldCare.date || oldCare.vaccinationDate || "",
                    medicine: oldCare.medicine || "",
                    intervalDays: oldCare.intervalDays || "",
                    reminders: Array.isArray(oldCare.reminders) && oldCare.reminders.length
                        ? oldCare.reminders.map(Number)
                        : [...DEFAULT_REMINDERS]
                };
            });

            return normalized;
        }

        function setScreen(screen) {
            currentScreen = screen;
            document.getElementById("home_screen").classList.toggle("active", screen === "home");
            document.getElementById("form_screen").classList.toggle("active", screen === "form");
            document.getElementById("detail_screen").classList.toggle("active", screen === "detail");
        }

        function showHome() {
            editingPetId = "";
            setScreen("home");
            renderHome();
        }

        function showPetForm(petId = "") {
            editingPetId = petId;
            uploadedPhotoData = "";
            document.getElementById("form_title").innerText = petId ? "Изменить питомца" : "Добавить питомца";

            if (petId) {
                const pet = getPet(petId);
                if (pet) {
                    document.getElementById("pet_name").value = pet.name;
                    document.getElementById("pet_type").value = pet.type;
                    populateBreeds(pet.breed);
                    document.getElementById("pet_birth_date").value = pet.birthDate;
                    document.getElementById("pet_photo_file").value = "";
                    uploadedPhotoData = pet.photo || "";
                    updatePhotoPreview(pet.photo);
                }
            } else {
                document.getElementById("pet_name").value = "";
                document.getElementById("pet_type").value = "dog";
                populateBreeds();
                document.getElementById("pet_birth_date").value = "";
                document.getElementById("pet_photo_file").value = "";
                updatePhotoPreview("");
            }

            setScreen("form");
        }

        function showDetail(petId) {
            selectedPetId = petId;
            activeCareKey = activeCareKey || CARE_TYPES[0].key;
            setScreen("detail");
            renderDetail();
        }

        function getPet(petId) {
            return appState.pets.find((pet) => pet.id === petId);
        }

        function populateBreeds(selectedBreed) {
            const type = document.getElementById("pet_type").value;
            const breedSelect = document.getElementById("pet_breed");
            const options = BREEDS[type] || [];
            breedSelect.innerHTML = options
                .map((breed) => `<option value="${escapeHtml(breed)}">${escapeHtml(breed)}</option>`)
                .join("");
            breedSelect.value = selectedBreed && options.includes(selectedBreed) ? selectedBreed : options[0];
        }

        function handlePhotoUpload(event) {
            const file = event.target.files?.[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                uploadedPhotoData = reader.result;
                updatePhotoPreview(uploadedPhotoData);
            };
            reader.readAsDataURL(file);
        }

        function updatePhotoPreview(photo) {
            const preview = document.getElementById("photo_preview");
            if (photo) {
                preview.innerHTML = `<img src="${escapeHtml(photo)}" alt="Фото питомца">`;
                return;
            }
            preview.innerHTML = escapeHtml(document.getElementById("pet_name").value.trim() || "Имя");
        }

        function refreshNamePreview() {
            if (!uploadedPhotoData) {
                updatePhotoPreview("");
            }
        }

        function savePet() {
            const name = document.getElementById("pet_name").value.trim();
            const type = document.getElementById("pet_type").value;
            const breed = document.getElementById("pet_breed").value;
            const birthDate = document.getElementById("pet_birth_date").value;
            const photo = uploadedPhotoData;

            if (!name) {
                showAlert("Введите имя питомца.");
                return;
            }

            if (editingPetId) {
                const pet = getPet(editingPetId);
                if (!pet) return;
                pet.name = name;
                pet.type = type;
                pet.breed = breed;
                pet.birthDate = birthDate;
                pet.photo = photo;
                selectedPetId = pet.id;
            } else {
                const pet = createPet({ name, type, breed, birthDate, photo });
                appState.pets.unshift(pet);
                selectedPetId = pet.id;
            }

            saveState();
            showDetail(selectedPetId);
        }

        function renderHome() {
            const list = document.getElementById("pets_list");

            if (!appState.pets.length) {
                list.innerHTML = `
                    <div class="empty-state">
                        <p class="empty-note">Пока нет питомцев. Начните с первой карточки, а дальше мы добавим вакцинации и обработки.</p>
                        <button class="add-card" type="button" onclick="showPetForm()">
                            <span class="add-icon">+</span>
                            <strong>Добавить питомца</strong>
                        </button>
                    </div>
                `;
                return;
            }

            list.innerHTML = `
                ${appState.pets.map((pet) => renderPetCard(pet)).join("")}
                <button class="add-card" type="button" onclick="showPetForm()">
                    <span class="add-icon">+</span>
                    <strong>Добавить питомца</strong>
                </button>
            `;
        }

        function renderPetCard(pet) {
            return `
                <button class="pet-card" type="button" onclick="showDetail('${pet.id}')">
                    <div class="pet-photo">${renderPhoto(pet)}</div>
                    <div>
                        <h2>${escapeHtml(pet.name)}</h2>
                        <p>${formatType(pet.type)} · ${escapeHtml(pet.breed)}</p>
                        <p>${pet.birthDate ? "Дата рождения: " + formatDate(pet.birthDate) : "Дата рождения не указана"}</p>
                    </div>
                    <span class="arrow">›</span>
                </button>
            `;
        }

        function renderDetail() {
            const pet = getPet(selectedPetId);
            const container = document.getElementById("pet_detail");
            if (!pet) {
                showHome();
                return;
            }

            container.innerHTML = `
                <div class="detail-title">
                    <button class="back-btn" type="button" onclick="showHome()">‹</button>
                    <h2>Карточка</h2>
                    <button class="round-action" type="button" onclick="showPetForm('${pet.id}')">✎</button>
                </div>

                <section class="profile-hero">
                    <div class="pet-photo">${renderPhoto(pet)}</div>
                    <div>
                        <h2>${escapeHtml(pet.name)}</h2>
                        <div class="chips">
                            <span class="chip">${formatType(pet.type)}</span>
                            <span class="chip green">${escapeHtml(pet.breed)}</span>
                            <span class="chip">${pet.birthDate ? formatDate(pet.birthDate) : "дата рождения не указана"}</span>
                        </div>
                    </div>
                </section>

                <nav class="tabs">
                    ${CARE_TYPES.map((careType) => `
                        <button
                            class="tab-btn ${activeCareKey === careType.key ? "active" : ""}"
                            type="button"
                            onclick="setActiveCare('${careType.key}')"
                        >
                            ${careType.shortTitle}
                        </button>
                    `).join("")}
                </nav>

                ${renderActiveCare(pet)}

                <div class="bottom-actions">
                    <button class="secondary-btn" type="button" onclick="showHome()">К списку</button>
                    <button class="primary-btn" type="button" onclick="sendData()">Отправить</button>
                </div>
            `;
        }

        function setActiveCare(careKey) {
            activeCareKey = careKey;
            renderDetail();
        }

        function renderActiveCare(pet) {
            const careType = CARE_TYPES.find((item) => item.key === activeCareKey) || CARE_TYPES[0];
            const care = pet.care[careType.key];
            const nextDate = calculateNextDate(care.date, care.intervalDays);

            return `
                <section class="care-card">
                    <div class="care-head">
                        <div>
                            <h3>${careType.title}</h3>
                            <p class="meta-text">Заполните данные.</p>
                        </div>
                        <div class="next-date">${nextDate || "Нет даты"}</div>
                    </div>

                    <label for="${careType.key}_date">Дата вакцинации / обработки</label>
                    <input
                        id="${careType.key}_date"
                        type="date"
                        value="${escapeHtml(care.date)}"
                        onchange="updateCareField('${pet.id}', '${careType.key}', 'date', this.value)"
                    >

                    <label for="${careType.key}_medicine">Препарат</label>
                    <input
                        id="${careType.key}_medicine"
                        type="text"
                        placeholder="Название препарата"
                        value="${escapeHtml(care.medicine)}"
                        oninput="updateCareField('${pet.id}', '${careType.key}', 'medicine', this.value, false)"
                    >

                    <label for="${careType.key}_interval">Интервал до следующей процедуры, дней</label>
                    <input
                        id="${careType.key}_interval"
                        type="number"
                        min="1"
                        placeholder="Например, 365"
                        value="${escapeHtml(care.intervalDays)}"
                        onchange="updateCareField('${pet.id}', '${careType.key}', 'intervalDays', this.value)"
                    >

                    <label class="reminders-title">Напоминания</label>
                    <div class="reminders">
                        ${DEFAULT_REMINDERS.map((day) => `
                            <label class="reminder-option">
                                <input
                                    type="checkbox"
                                    ${care.reminders.includes(day) ? "checked" : ""}
                                    onchange="toggleReminder('${pet.id}', '${careType.key}', ${day}, this.checked)"
                                >
                                <span>за ${day} ${pluralizeDays(day)}</span>
                            </label>
                        `).join("")}
                    </div>
                </section>
            `;
        }

        function updateCareField(petId, careKey, field, value, shouldRerender = true) {
            const pet = getPet(petId);
            if (!pet) return;
            pet.care[careKey][field] = value;
            saveState();

            if (shouldRerender) {
                renderDetail();
            }
        }

        function toggleReminder(petId, careKey, day, checked) {
            const pet = getPet(petId);
            if (!pet) return;

            const reminders = new Set((pet.care[careKey].reminders || []).map(Number));
            if (checked) {
                reminders.add(day);
            } else {
                reminders.delete(day);
            }
            pet.care[careKey].reminders = Array.from(reminders).sort((a, b) => b - a);
            saveState();
        }

        function renderPhoto(pet) {
            if (!pet.photo) return escapeHtml(pet.name || "Имя");
            return `<img src="${escapeHtml(pet.photo)}" alt="${escapeHtml(pet.name)}">`;
        }

        function formatType(type) {
            return type === "cat" ? "кошка" : "собака";
        }

        function formatDate(dateValue) {
            if (!dateValue) return "";
            const date = new Date(dateValue);
            if (Number.isNaN(date.getTime())) return "";
            return date.toLocaleDateString("ru-RU", {
                day: "numeric",
                month: "long",
                year: "numeric"
            });
        }

        function calculateNextDate(lastDate, intervalDays) {
            if (!lastDate || !intervalDays) return "";
            const date = new Date(lastDate);
            const interval = Number(intervalDays);
            if (Number.isNaN(date.getTime()) || !interval) return "";
            date.setDate(date.getDate() + interval);
            return date.toLocaleDateString("ru-RU", {
                day: "numeric",
                month: "short",
                year: "numeric"
            });
        }

        function pluralizeDays(value) {
            const mod10 = value % 10;
            const mod100 = value % 100;
            if (mod10 === 1 && mod100 !== 11) return "день";
            if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return "дня";
            return "дней";
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function sendData() {
            const payload = {
                pets: appState.pets.map((pet) => ({
                    id: pet.id,
                    name: pet.name,
                    type: formatType(pet.type),
                    breed: pet.breed,
                    birthDate: pet.birthDate,
                    photo: pet.photo,
                    care: CARE_TYPES.map((careType) => {
                        const care = pet.care[careType.key];
                        return {
                            title: careType.title,
                            date: care.date,
                            medicine: care.medicine,
                            intervalDays: care.intervalDays,
                            nextDate: calculateNextDate(care.date, care.intervalDays),
                            reminders: care.reminders
                        };
                    })
                }))
            };

            if (tg?.sendData) {
                tg.sendData(JSON.stringify(payload));
                showAlert("Данные отправлены в Telegram.");
                return;
            }

            console.log("Telegram payload", payload);
            showAlert("Telegram Web App недоступен. Данные выведены в консоль браузера.");
        }

        function showAlert(message) {
            if (tg?.showAlert) {
                tg.showAlert(message);
                return;
            }
            window.alert(message);
        }

        populateBreeds();
        renderHome();
    </script>
</body>
</html>
